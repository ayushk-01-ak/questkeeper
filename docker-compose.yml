# docker-compose.yml
# Defines and connects all QuestKeeper services

services:

  backend:
    build: .
    container_name: questkeeper-backend
    command: uvicorn app.api.routes:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./data:/app/data
      - ./chroma_store:/app/chroma_store
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build: .
    container_name: questkeeper-frontend
    command: streamlit run app/frontend/chat.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped