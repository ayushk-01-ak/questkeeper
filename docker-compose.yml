version: '3.8'

services:
  backend:
    build: .
    container_name: questkeeper-backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    restart: unless-stopped
    command: uvicorn app.api.routes:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - ollama

  frontend:
    build: .
    container_name: questkeeper-frontend
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    command: streamlit run app/frontend/chat.py --server.port=8501 --server.address=0.0.0.0
    restart: unless-stopped
    depends_on:
      - backend

  ollama:
    image: ollama/ollama
    container_name: questkeeper-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped

volumes:
  ollama:
